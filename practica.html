<!DOCTYPE html>
<html>

<head>
    <title>EXAMEN</title>
    <meta charset="utf-8">
    <script type="text/javascript" src="./JS/capturaDatos.js"></script>
</head>
<body>
    <h1>FORMULARIO DE ALUMNOS </h1>
    <form name=datosAlumnos>
        <label for="name">Escribe tu nombre completo</label>
        <input type="text" id="nombre" name="n"><br><br>
        <label for="e">Escribe la Edad del alumno</label>
        <input type="number" id="edad" name="caracteres"><br><br>
        <label for="mus">Musica Favorita</label>
        <select id="musica" name="musica" size="1">
          <option value="ROCK">ROCK</option>
          <option value="HIP">HIP HOP</option>
          <option value="BANDA">BANDA DE VIENTO</option>
      </select><br><br>
        <label for="int">Escribe tus intereses personales</label>
        <textarea id="intereses" name="intereses" rows=10 cols=30></textarea><br><br>
        <label for="se">Selecciona tu sexo</label><br> Masculino
        <input type="radio" id="m" name="s" value="masculino"> Femenino
        <input type="radio" id="f" name="s" value="femenino"><br><br>
        <label for="ma">Selecciona tu mascota favorita</label><br> Perro
        <input type="checkbox" id="p" name="p" vale="perro"> Gato
        <input type="checkbox" id="g" name="g" value="gato"><br><br>
        <button type="button" onclick="capturarDatos()">Pulsa aquí</button>
    </form>
</body>
</html>
